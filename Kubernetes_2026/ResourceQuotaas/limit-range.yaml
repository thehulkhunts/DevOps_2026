apiVersion: v1
kind: LimitRange
metadata:
  name: prod-resource-limits
  namespace: prod

spec:
  limits:
  - type: Container

    # Default limits applied if container does not specify limits
    default:
      cpu: "1"
      memory: "1Gi"

    # Default requests applied if container does not specify requests
    defaultRequest:
      cpu: "500m"
      memory: "512Mi"

    # Minimum allowed per container
    min:
      cpu: "100m"
      memory: "128Mi"
      
    # Maximum allowed per container
    max:
      cpu: "2"
      memory: "2Gi"