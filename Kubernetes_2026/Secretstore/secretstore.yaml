apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretmanager
  namespace: payment
spec:
  provider:
    aws: 
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRed:
            name: external-secrets-sa
            namespace: payment

