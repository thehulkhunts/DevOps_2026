---
# =============================================================
# 02-fluentbit-configmap.yaml
# Fluent Bit sidecar config:
#   - INPUT  : tails /var/log/app/*.log (shared emptyDir volume)
#   - FILTER : adds Kubernetes metadata (pod, namespace, node)
#   - FILTER : parses JSON log lines from the Node.js app
#   - OUTPUT : ships to AWS CloudWatch Logs
# =============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: sidecar-demo
  labels:
    app: node-api
    component: fluent-bit-sidecar
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     warn
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    # ── Nginx access log (JSON format) ──────────────────────────
    [INPUT]
        Name              tail
        Tag               nginx.access
        Path              /var/log/nginx/access.log
        Parser            json
        DB                /fluent-bit/db/nginx-access.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # ── Nginx error log (plain text) ────────────────────────────
    [INPUT]
        Name              tail
        Tag               nginx.error
        Path              /var/log/nginx/error.log
        DB                /fluent-bit/db/nginx-error.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # ── Application log (JSON format from Node.js) ───────────────
    [INPUT]
        Name              tail
        Tag               app.log
        Path              /var/log/app/*.log
        Parser            json
        DB                /fluent-bit/db/app.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  5

    # ── Enrich all records with k8s metadata ────────────────────
    [FILTER]
        Name                kubernetes
        Match               *
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    # ── Drop health-check noise ──────────────────────────────────
    [FILTER]
        Name    grep
        Match   nginx.access
        Exclude request GET /healthz

    # ── OUTPUT → CloudWatch Logs ─────────────────────────────────
    [OUTPUT]
        Name                cloudwatch_logs
        Match               nginx.*
        region              ap-south-1
        log_group_name      /eks/sidecar-demo/nginx
        log_stream_prefix   pod/
        auto_create_group   true
        retry_limit         5

    [OUTPUT]
        Name                cloudwatch_logs
        Match               app.*
        region              ap-south-1
        log_group_name      /eks/sidecar-demo/application
        log_stream_prefix   pod/
        auto_create_group   true
        retry_limit         5

  parsers.conf: |
    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep   On

    [PARSER]
        Name        nginx_error
        Format      regex
        Regex       ^(?<time>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?<level>\w+)\] (?<pid>\d+)#(?<tid>\d+): (?<message>.*)$
        Time_Key    time
        Time_Format %Y/%m/%d %H:%M:%S
