---
# =============================================================
# 04-deployment.yaml
# 3-container Pod:
#   1. node-api        — main app  (port 3000, localhost only)
#   2. nginx-proxy     — sidecar 1 (TLS termination + rate limit)
#   3. fluent-bit      — sidecar 2 (log shipping to CloudWatch)
#
# Shared volumes:
#   app-logs    emptyDir  /var/log/app      (app writes, fluentbit reads)
#   nginx-logs  emptyDir  /var/log/nginx    (nginx writes, fluentbit reads)
#   nginx-tmp   emptyDir  /tmp              (nginx PID & temp files)
#   fb-db       emptyDir  /fluent-bit/db    (fluent-bit tail position DB)
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-api
  namespace: sidecar-demo
  labels:
    app: node-api
    version: "1.0.0"
    environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: node-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deploys
  template:
    metadata:
      labels:
        app: node-api
        version: "1.0.0"
      annotations:
        # Restart pods when ConfigMaps change (checksum-based rollout)
        checksum/nginx-config:      "{{ nginx-config-checksum }}"
        checksum/fluent-bit-config: "{{ fluent-bit-config-checksum }}"
        # Prometheus scrape endpoint exposed by Fluent Bit
        prometheus.io/scrape: "true"
        prometheus.io/port:   "2020"
        prometheus.io/path:   "/api/v1/metrics/prometheus"
    spec:
      serviceAccountName: nodeapp-sa
      terminationGracePeriodSeconds: 60

      # ── Security context (pod-level) ──────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser:    1000
        runAsGroup:   1000
        fsGroup:      2000
        seccompProfile:
          type: RuntimeDefault

      # ── Spread replicas across AZs ────────────────────────────
      topologySpreadConstraints:
        - maxSkew:           1
          topologyKey:       topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: node-api

      # ── Anti-affinity: no two pods on the same node ───────────
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key:      app
                    operator: In
                    values:   [node-api]
              topologyKey: kubernetes.io/hostname

      # ╔══════════════════════════════════════════════════════════╗
      # ║  CONTAINER 1 — Main Application (Node.js REST API)      ║
      # ╚══════════════════════════════════════════════════════════╝
      containers:
        - name: node-api
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/node-api:1.0.0
          imagePullPolicy: Always
          ports:
            - name: http-app
              containerPort: 3000
              protocol: TCP

          # App only binds to loopback — Nginx is the only ingress
          env:
            - name: NODE_ENV
              value: production
              #Node.js and almost every npm package reads this variable at runtime. 
              #When it's production:
            - name: PORT
              value: "3000"
            - name: LOG_DIR
              value: /var/log/app
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          #Your app doesn't know its own pod name at build time — 
          #that name is generated by Kubernetes when the pod starts. 
          #The Downward API injects the actual runtime value as an env var.

          # ── Resource limits ──────────────────────────────────
          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "512Mi"

          # ── Probes ───────────────────────────────────────────
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            failureThreshold: 12      # 12 × 5s = 60s for cold start
            periodSeconds:    5

          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 0
            periodSeconds:       10
            failureThreshold:    3
            timeoutSeconds:      3

          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 0
            periodSeconds:       5
            failureThreshold:    3
            timeoutSeconds:      3

          # ── Security context ──────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

          # ── Volume mounts ─────────────────────────────────────
          volumeMounts:
            - name:      app-logs
              mountPath: /var/log/app
            - name:      app-tmp
              mountPath: /tmp

        # ╔══════════════════════════════════════════════════════════╗
        # ║  SIDECAR 1 — Nginx Reverse Proxy                        ║
        # ║  Responsibility: TLS termination, rate limiting,        ║
        # ║  security headers, upstream health management           ║
        # ╚══════════════════════════════════════════════════════════╝
        - name: nginx-proxy
          image: nginx:1.27.0-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP

          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "200m"
              memory: "128Mi"

          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 5
            periodSeconds:       15
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path:   /healthz
              port:   8443
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds:       5
            failureThreshold:    3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            runAsUser:  101           # nginx user in Alpine image
            runAsGroup: 101
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name:      nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath:   nginx.conf
              readOnly:  true
            - name:      nginx-tls
              mountPath: /etc/nginx/certs
              readOnly:  true
            - name:      nginx-logs
              mountPath: /var/log/nginx
            - name:      nginx-tmp
              mountPath: /tmp
            - name:      nginx-cache
              mountPath: /var/cache/nginx

        # ╔══════════════════════════════════════════════════════════╗
        # ║  SIDECAR 2 — Fluent Bit Log Shipper                     ║
        # ║  Responsibility: tail shared log volumes,               ║
        # ║  enrich with k8s metadata, ship to CloudWatch           ║
        # ╚══════════════════════════════════════════════════════════╝
        - name: fluent-bit
          image: public.ecr.aws/aws-observability/aws-for-fluent-bit:2.32.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: fb-metrics
              containerPort: 2020
              protocol: TCP

          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "200m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 2020
            initialDelaySeconds: 10
            periodSeconds:       30
            failureThreshold:    3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name:      fluent-bit-config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath:   fluent-bit.conf
              readOnly:  true
            - name:      fluent-bit-config
              mountPath: /fluent-bit/etc/parsers.conf
              subPath:   parsers.conf
              readOnly:  true
            # Read app and nginx logs (shared emptyDirs)
            - name:      app-logs
              mountPath: /var/log/app
              readOnly:  true
            - name:      nginx-logs
              mountPath: /var/log/nginx
              readOnly:  true
            # Fluent Bit tail position DB (persists offsets across restarts)
            - name:      fb-db
              mountPath: /fluent-bit/db
            - name:      fb-tmp
              mountPath: /tmp

      # ── Volumes ───────────────────────────────────────────────
      volumes:
        # Shared log volumes (the sidecar pattern core mechanism)
        - name: app-logs
          emptyDir:
            sizeLimit: 500Mi

        - name: nginx-logs
          emptyDir:
            sizeLimit: 200Mi

        # ConfigMaps
        - name: nginx-config
          configMap:
            name: nginx-config

        - name: fluent-bit-config
          configMap:
            name: fluent-bit-config

        # TLS secret mounted into nginx sidecar
        - name: nginx-tls
          secret:
            secretName:  nginx-tls-secret
            defaultMode: 0400

        # Writable temp/cache dirs (required for readOnlyRootFilesystem: true)
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: app-tmp
          emptyDir: {}
        - name: fb-db
          emptyDir: {}
        - name: fb-tmp
          emptyDir: {}
