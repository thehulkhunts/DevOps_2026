---
# =============================================================
# 01-nginx-configmap.yaml
# Nginx acts as the sidecar reverse proxy:
#   - Listens on 443 (TLS terminated via cert-manager secret)
#   - Proxies to localhost:3000 (the Node.js app container)
#   - Rate limiting: 20 req/s per IP burst 40
#   - Security headers injected at this layer
# =============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: sidecar-demo
  labels:
    app: node-api
    component: nginx-sidecar
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;

    events {
      worker_connections 1024;
      use epoll;
    }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;

      # --- Logging format (JSON for Fluent Bit ingestion) ---
      log_format json_combined escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"request":"$request",'
          '"status":$status,'
          '"body_bytes_sent":$body_bytes_sent,'
          '"http_referer":"$http_referer",'
          '"http_user_agent":"$http_user_agent",'
          '"request_time":$request_time,'
          '"upstream_response_time":"$upstream_response_time",'
          '"upstream_addr":"$upstream_addr"'
        '}';

      access_log /var/log/nginx/access.log json_combined;

      sendfile           on;
      tcp_nopush         on;
      tcp_nodelay        on;
      keepalive_timeout  65;
      server_tokens      off;

      # --- Rate limiting zone: 20r/s per IP, 10MB shared memory ---
      limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
      limit_req_status 429;

      # --- Gzip compression ---
      gzip on;
      gzip_types text/plain application/json application/javascript text/css;
      gzip_min_length 1024;

      server {
        listen 8443 ssl;
        server_name _;

        # TLS certs mounted from Kubernetes Secret (cert-manager)
        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # --- Security headers ---
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "no-referrer-when-downgrade" always;

        # --- Health endpoint — bypasses rate limit for ALB/NLB health checks ---
        location /healthz {
          proxy_pass         http://127.0.0.1:3000/healthz;
          proxy_set_header   Host $host;
          access_log off;
        }

        # --- API routes ---
        location /api/ {
          limit_req  zone=api_limit burst=40 nodelay;

          proxy_pass         http://127.0.0.1:3000;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_set_header   Connection        "";

          proxy_connect_timeout 5s;
          proxy_read_timeout    30s;
          proxy_send_timeout    10s;

          # Prevent internal details leaking on upstream errors
          proxy_intercept_errors on;
          error_page 502 503 504 = @upstream_error;
        }

        location @upstream_error {
          default_type application/json;
          return 503 '{"error":"service_unavailable","message":"Upstream temporarily unavailable"}';
        }
      }
    }
