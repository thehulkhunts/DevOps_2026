---
# =============================================================
# 03-tls-secret.yaml
# TLS certificate for Nginx sidecar.
# In production: managed by cert-manager with ACM PCA or
# Let's Encrypt. The Secret is referenced as a volume mount.
#
# To generate a self-signed cert for testing:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout tls.key -out tls.crt \
#     -subj "/CN=node-api.sidecar-demo.svc.cluster.local"
#   kubectl create secret tls nginx-tls-secret \
#     -n sidecar-demo --cert=tls.crt --key=tls.key
#
# In CI/CD: cert-manager Certificate CR (see cert-manager docs)
# =============================================================
# This file is a placeholder — cert-manager auto-creates the
# Secret named below. Do not apply this manually if using cert-manager.
apiVersion: v1
kind: Secret
metadata:
  name: nginx-tls-secret
  namespace: sidecar-demo
  annotations:
    # cert-manager will populate this secret automatically
    cert-manager.io/issuer: "letsencrypt-prod"
  labels:
    app: node-api
type: kubernetes.io/tls
data:
  # Base64-encoded values — replaced by cert-manager at runtime
  tls.crt: ""
  tls.key: ""
