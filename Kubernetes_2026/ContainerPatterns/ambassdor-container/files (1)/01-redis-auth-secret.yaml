---
# =============================================================
# 01-redis-auth-secret.yaml
# Holds the AUTH token for ElastiCache Redis.
# In production: populate via External Secrets Operator pulling
# from AWS Secrets Manager — NOT committed to git with a real value.
#
# To create manually for testing:
#   kubectl create secret generic redis-auth \
#     -n ambassador-demo \
#     --from-literal=password='YOUR_REDIS_AUTH_TOKEN'
# =============================================================
apiVersion: v1
kind: Secret
metadata:
  name: redis-auth
  namespace: ambassador-demo
  labels:
    app: order-worker
type: Opaque
stringData:
  # Placeholder — replace via External Secrets Operator or
  # kubectl create secret in production. Never commit a real value.
  password: "REPLACE_WITH_ELASTICACHE_AUTH_TOKEN"
