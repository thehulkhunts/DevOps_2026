apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api-service
  namespace: payments 
  labels:
    app: payments-app-pods
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments 
  template:
    metadata:
      labels:
        app: payments
    spec:
      restartPolicy: Always
      priorityClassName: high-priority
      serviceAccountName: irsa-aws-secretmanager
      volumes:
      - name: certificate-volume
        emptyDir: {}
      affinity:
        nodeAffinities:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: kubernetes.io/os
                operator: In 
                values:
                - linux 
      initContainers:
      - name: init-container
        image: payment-cert-init:v1
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: certificate-volume 
          mountPath: /certs
      containers: 
      - name: payments-app 
        image: payments/api:v1.0
        ports: 
          - containerPort: 8080
            protocol: TCP
        resources: 
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        volumeMounts:
        - name: certificate-volume
          mountPath: /app/certs
        env:
        - name: TLS_CERT_PATH
          value: /app/certs/client.crt
        - name: TLS_KEY_PATH
          value: /app/certs/client.key
      
       
      
  