# This policy will allows external traffic from internet 
# you are exposing ypur appliation to internet for ingress traffic

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-traffic
  namespace: web-api-prod
spec:
  podSelector:
    matchLabels:
      app: web-api
  ingress:
  - from: []

  #To restrict external access only to port 80, you can deploy an ingress rule
    #such as:
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-traffic
  namespace: web-api-prod
spec:
  podSelector:
    matchLabels:
      app: web-api
  ingress:
  - ports:
    - port: 80
    from: []