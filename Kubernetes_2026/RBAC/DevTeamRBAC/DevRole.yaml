apiVersion: rbac.authorization.k8s.io/v1
kind: Role 
metadata:
  name: role-paymentapi-devteam
  namespace: dev 
rules:
- apiGroup: [""]
  resources:
  - pods
  - pods/log
  - secrets
  - configmaps
  - serviceaccounts
  - services 
  - persistentvolumeclaims 
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroup: ["apps"]
  resources:
  - deployments
  - replicasets
  - statefulsets
  - daemonsets
  verbs:
  - get
  - list
  - watch
