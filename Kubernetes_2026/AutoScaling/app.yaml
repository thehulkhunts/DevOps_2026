apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service-app
      version: v1.0.0
  template:
    metadata:
      labels: 
        app: api-service-app
        version: v1.0.0
    spec:
      imagePullSecrets:
      - name: reg-cred
      affinities:
        podAffinity:
          requiredDuringSchedulingIgnoredDUringExecution:
          - labelSelector:
            matchExpression:
            - key: kubernetes.io/arch
              operator: In 
              values:
              - linux 
      containers:
      - name: api-service
        image: vinayjadhav/web-app:v1.0.0
        ports:
        - containerPort: 8080
          protocol: TCP
          name: web 
        resource:
          requests:
            cpu: "200m"
            memory: "250Mi"
          limits:
            cpu: 1
            memory: "512Mi"
        # if you specify a limit to the pod and pod consumes more than its limits then pod goes into 
        # OOM killed state.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFileSystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
        

    
    