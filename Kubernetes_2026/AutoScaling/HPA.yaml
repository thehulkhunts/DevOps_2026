apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-api-service
  namespace: prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-service
  minReplicas: 2
  maxReplicas: 5
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300 #with out behavior Pods constantly increase/decrease (flapping).  
  metrics:
  - type: Resource 
    name: cpu
    target: 
      type: Utilization
      averageUtilization: 70
  - type: Resource
    name: memory
    target:
      type: Utilization
      averageUtilization: 50