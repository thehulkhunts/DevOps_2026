---
# =============================================================
# 09-auto-generate-default-netpol.yaml
# REAL SCENARIO: A new team spins up a new namespace for a new
# microservice. They forget to write a NetworkPolicy (most teams
# do — it's not the first thing on anyone's mind when shipping a
# feature). By default, EKS networking allows ALL pods to talk to
# ALL other pods across the entire cluster. This means a
# compromised low-value service (e.g. an internal admin tool) can
# move laterally to a high-value service (e.g. a payments pod)
# with zero friction.
#
# Instead of relying on every team to remember NetworkPolicies
# (like we hand-wrote in both the sidecar and ambassador
# examples), this policy uses Kyverno's "generate" rule to
# automatically create a default-deny NetworkPolicy in every new
# namespace the moment it's created. Teams then add specific
# allow rules on top — deny-by-default, not allow-by-default.
# =============================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: auto-generate-default-deny-netpol
  annotations:
    policies.kyverno.io/title:       Auto-Generate Default-Deny NetworkPolicy
    policies.kyverno.io/category:    Multi-Tenancy, Network Security
    policies.kyverno.io/severity:    high
    policies.kyverno.io/description: >-
      Automatically creates a default-deny-all NetworkPolicy in
      every new namespace, so lateral movement is blocked by
      default rather than relying on every team to remember to
      write one.
spec:
  rules:
    - name: generate-default-deny
      match:
        any:
          - resources:
              kinds: [Namespace]
      exclude:
        any:
          - resources:
              names:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - default
      generate:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: default-deny-all
        namespace: "{{ request.object.metadata.name }}"
        synchronize: true
        data:
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
              - Egress