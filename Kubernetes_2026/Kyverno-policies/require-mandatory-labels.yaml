---
# =============================================================
# 11-require-mandatory-labels.yaml
# REAL SCENARIO: A production incident happens at 2 AM. The
# on-call engineer finds a misbehaving pod but has no idea which
# team owns it, what Slack channel to page, or what cost center
# it belongs to. Without enforced labels, ownership tracking
# relies entirely on tribal knowledge or a wiki page that's six
# months out of date.
#
# This also breaks cost allocation — finance asks "what's costing
# us $40k this month" and nobody can attribute spend to teams
# without consistent labels for chargeback/showback reporting.
#
# This policy requires every Deployment to carry team, owner,
# and cost-center labels.
# =============================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-mandatory-labels
  annotations:
    policies.kyverno.io/title:       Require Mandatory Ownership Labels
    policies.kyverno.io/category:    Multi-Tenancy, Best Practices
    policies.kyverno.io/severity:    medium
    policies.kyverno.io/description: >-
      Every Deployment must carry team, owner, and cost-center
      labels so incidents can be routed to the right team and
      spend can be attributed correctly.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-labels
      match:
        any:
          - resources:
              kinds: [Deployment, StatefulSet, DaemonSet]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
      validate:
        message: >-
          Missing required labels. Every workload must define:
          app.kubernetes.io/team, app.kubernetes.io/owner,
          and cost-center.
        pattern:
          metadata:
            labels:
              app.kubernetes.io/team:  "?*"
              app.kubernetes.io/owner: "?*"
              cost-center:             "?*"