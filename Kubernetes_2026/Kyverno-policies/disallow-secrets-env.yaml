---
# =============================================================
# 14-disallow-secrets-as-env-vars.yaml
# REAL SCENARIO: A developer references a Secret via
# env.valueFrom.secretKeyRef instead of mounting it as a volume.
# This seems harmless, but environment variables are far more
# exposed than file-based secrets: they appear in
# `kubectl describe pod` output to anyone with pod-read RBAC
# access, they get dumped into crash logs and error reporting
# tools (Sentry, Datadog APM) that capture process environment
# on exception, and they're inherited by every child process the
# app spawns — including third-party npm packages doing
# diagnostic dumps.
#
# This is exactly the kind of mistake that leaked the Redis AUTH
# token from the ambassador example if someone had wired it into
# the order-worker container's env instead of keeping it isolated
# to the stunnel ambassador container.
#
# This policy disallows secretKeyRef in container env and pushes
# teams toward volume-mounted secrets instead.
# =============================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-secrets-as-env-vars
  annotations:
    policies.kyverno.io/title:       Disallow Secrets as Environment Variables
    policies.kyverno.io/category:    Best Practices, Secrets Management
    policies.kyverno.io/severity:    medium
    policies.kyverno.io/description: >-
      Secrets must be mounted as files, not injected as
      environment variables. Env vars are exposed via kubectl
      describe, process inspection, and are often captured
      unintentionally by crash/error reporting tools.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: disallow-secret-env-vars
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
      validate:
        message: >-
          Secrets must not be injected as environment variables
          via secretKeyRef. Mount them as files using a volume
          instead — this avoids exposure via kubectl describe,
          process listings, and crash reporting tools.
        foreach:
          - list: "request.object.spec.containers[]"
            deny:
              conditions:
                any:
                  - key:      "{{ element.env[?valueFrom.secretKeyRef] | length(@) }}"
                    operator: GreaterThan
                    value:    0