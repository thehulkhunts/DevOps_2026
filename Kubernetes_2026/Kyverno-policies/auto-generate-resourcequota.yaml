---
# =============================================================
# 20-auto-generate-resourcequota.yaml
# REAL SCENARIO: A new team's namespace has no ResourceQuota.
# A misconfigured HPA (maxReplicas: 1000 instead of 100, a typo
# that's easy to make) or a runaway CronJob that spawns a new Job
# every minute without cleanup starts consuming unbounded cluster
# capacity. Other teams' pods start failing to schedule
# ("Insufficient cpu") because one namespace silently ate the
# entire node group's capacity — and because there's no quota,
# Kubernetes never stopped it.
#
# This mirrors policy 09 from the first batch (auto-generate
# default-deny NetworkPolicy) but for compute capacity instead
# of network access — using Kyverno's generate rule to ensure
# every new namespace gets sane default boundaries automatically,
# rather than relying on every team to request one.
# =============================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: auto-generate-resourcequota
  annotations:
    policies.kyverno.io/title:       Auto-Generate Namespace ResourceQuota
    policies.kyverno.io/category:    Multi-Tenancy, Cost Optimization
    policies.kyverno.io/severity:    medium
    policies.kyverno.io/description: >-
      Automatically creates a default ResourceQuota in every new
      namespace, so no single namespace can silently consume
      unbounded cluster capacity and starve other teams'
      workloads.
spec:
  rules:
    - name: generate-default-quota
      match:
        any:
          - resources:
              kinds: [Namespace]
      exclude:
        any:
          - resources:
              names:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - default
      generate:
        apiVersion: v1
        kind: ResourceQuota
        name: default-namespace-quota
        namespace: "{{ request.object.metadata.name }}"
        synchronize: true
        data:
          spec:
            hard:
              requests.cpu:               "20"
              requests.memory:            "40Gi"
              limits.cpu:                 "40"
              limits.memory:              "80Gi"
              persistentvolumeclaims:     "10"
              services.loadbalancers:     "2"
              count/deployments.apps:     "30"
              count/jobs.batch:           "20"

    - name: generate-default-limitrange
      match:
        any:
          - resources:
              kinds: [Namespace]
      exclude:
        any:
          - resources:
              names:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - default
      generate:
        apiVersion: v1
        kind: LimitRange
        name: default-namespace-limitrange
        namespace: "{{ request.object.metadata.name }}"
        synchronize: true
        data:
          spec:
            limits:
              - type: Container
                default:
                  cpu:    "500m"
                  memory: "512Mi"
                defaultRequest:
                  cpu:    "100m"
                  memory: "128Mi"
                max:
                  cpu:    "2"
                  memory: "2Gi"
                min:
                  cpu:    "50m"
                  memory: "64Mi"